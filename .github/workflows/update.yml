name: Update revisions

on:
  workflow_dispatch:
  schedule:
    - cron: '45 */6 * * *'

jobs:
  main:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: 'registry.fedoraproject.org/fedora-minimal:latest'

    steps:
      - name: Prepare
        run: |
          dnf -y install --nodocs --setopt=install_weak_deps=0 \
            git-core rpm-build curl perl-interpreter jq rpmdevtools copr-cli parallel

      - uses: actions/checkout@v4

      - name: Run updaters
        env:
          COPR_WEBHOOK: ${{ secrets.COPR_WEBHOOK }}
          COPR_CONFIG: ${{ secrets.COPR_CONFIG }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # hyprland/update.sh drives an ordered COPR rebuild (hyprland ->
          # hyprland-plugins) via copr-cli when this token is present.
          if [ -n "${COPR_CONFIG:-}" ]; then
            mkdir -p ~/.config
            printf '%s\n' "$COPR_CONFIG" > ~/.config/copr
            chmod 600 ~/.config/copr
          fi
          find -name "update.sh" -execdir {} \;
