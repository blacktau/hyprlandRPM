name: Repoclosure

on:
  workflow_dispatch:
  schedule:
    - cron: '25 9 * * *'

jobs:
  repoclosure:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    strategy:
      fail-fast: false
      matrix:
        version:
          - 44
    container:
      image: registry.fedoraproject.org/fedora:${{ matrix.version }}
    steps:
      - name: Prepare
        run: |
          cat << 'EOF' >> /etc/yum.repos.d/coprs.repo
          [copr:copr.fedorainfracloud.org:blacktau:hyprland]
          name=Copr repo for hyprland owned by blacktau
          baseurl=https://download.copr.fedorainfracloud.org/results/blacktau/hyprland/fedora-$releasever-$basearch/
          type=rpm-md
          skip_if_unavailable=True
          gpgcheck=1
          gpgkey=https://download.copr.fedorainfracloud.org/results/blacktau/hyprland/pubkey.gpg
          repo_gpgcheck=0
          enabled=1
          enabled_metadata=1
          EOF

      - name: Repoclosure
        run: |
          dnf repoclosure \
            --check copr:copr.fedorainfracloud.org:blacktau:hyprland \
            --newest

      - name: Repoclosure (with --best)
        run: |
          dnf repoclosure \
            --check copr:copr.fedorainfracloud.org:blacktau:hyprland \
            --newest --best

      - name: Open issue on failure
        if: failure() && github.event_name == 'schedule'
        uses: JasonEtco/create-an-issue@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FEDORA: ${{ matrix.version }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          filename: .github/repoclosure-failure.md
          update_existing: true
          search_existing: open
